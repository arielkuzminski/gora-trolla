<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
  <!-- Mountain silhouette (Troll's Mountain) -->
  <path d="M24 6 L6 38 L42 38 Z" fill="none" stroke="#d4a843" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner peak detail -->
  <path d="M24 12 L14 38 L34 38 Z" fill="rgba(212,168,67,0.12)" stroke="#d4a843" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Musical note on peak -->
  <circle cx="24" cy="9" r="2" fill="#d4a843"/>
  <!-- Decorative horizontal line -->
  <line x1="8" y1="38" x2="40" y2="38" stroke="#d4a843" stroke-width="1" opacity="0.5"/>
  <!-- Corner ornaments -->
  <path d="M4 4 L10 4 M4 4 L4 10" stroke="#d4a843" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M44 4 L38 4 M44 4 L44 10" stroke="#d4a843" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M4 44 L10 44 M4 44 L4 38" stroke="#d4a843" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M44 44 L38 44 M44 44 L44 38" stroke="#d4a843" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
